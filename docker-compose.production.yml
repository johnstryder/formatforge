# FormatForge production — formatforgeplus.com
# 1. Point DNS A record for formatforgeplus.com to this server's IP
# 2. Run: docker compose -f docker-compose.production.yml up -d
# 3. Get SSL: certbot certonly --webroot -w ./public -d formatforgeplus.com -d www.formatforgeplus.com
#    (or use certbot with nginx plugin; see DEPLOYMENT.md)
# 4. Uncomment HTTPS block in nginx/formatforgeplus.conf, add cert volume, restart nginx

services:
  nginx:
    image: nginx:alpine
    container_name: formatforge-nginx
    ports:
      - "80:80"
      # - "443:443"  # Uncomment after SSL certs are in place
    volumes:
      - .:/var/www/html:ro
      - ./nginx/formatforgeplus.conf:/etc/nginx/conf.d/default.conf:ro
      # - /etc/letsencrypt:/etc/letsencrypt:ro  # Uncomment after certbot
    depends_on:
      - php

  php:
    image: php:8.2-fpm-alpine
    container_name: formatforge-php
    volumes:
      - .:/var/www/html:ro
    depends_on:
      - pocketbase
    command: php-fpm

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: formatforge-pocketbase
    ports:
      - "127.0.0.1:8090:8090"  # Admin only on localhost; use SSH tunnel if remote
    environment:
      PB_ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      PB_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - ./pb_data:/pb_data
      - ./pb_migrations:/pb_data/pb_migrations:ro
