# Antfly - self-hosted AI search/indexing for FormatForge
# Run: ANTFLY_PORT=8080 docker compose -f docker-compose.antfly.yml up -d
# Or use start.sh which picks a free port and writes to .antfly-port
services:
  antfly:
    image: ghcr.io/antflydb/antfly:omni
    container_name: formatforge-antfly
    ports:
      - "${ANTFLY_PORT:-8080}:8080"
    volumes:
      - antfly_data:/antflydb
    command: swarm
    restart: unless-stopped

volumes:
  antfly_data: {}
