# FormatForge — nginx + PHP-FPM + PocketBase
# Run: docker compose -f docker-compose.nginx.yml up -d
# App: http://127.0.0.1:8010 (override with APP_PORT=8010)
# PocketBase Admin: http://127.0.0.1:8090/_/

services:
  nginx:
    image: nginx:alpine
    container_name: formatforge-nginx
    ports:
      - "${APP_PORT:-8010}:80"
    volumes:
      - .:/var/www/html:ro
      - ./nginx/formatforge.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  php:
    image: php:8.2-fpm-alpine
    container_name: formatforge-php
    volumes:
      - .:/var/www/html:ro
    depends_on:
      - pocketbase
    # Extensions for FormatForge (curl, json, session are built-in)
    command: php-fpm

  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: formatforge-pocketbase
    ports:
      - "8090:8090"
    environment:
      PB_ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      PB_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - ./pb_data:/pb_data
      - ./pb_migrations:/pb_data/pb_migrations:ro
