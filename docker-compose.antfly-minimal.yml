# Antfly minimal — no AVX2, external embeddings only
# Run: docker compose -f docker-compose.antfly-minimal.yml up -d --build
services:
  antfly:
    build:
      context: .
      dockerfile: Dockerfile.antfly-minimal
    image: formatforge-antfly:minimal
    container_name: formatforge-antfly
    ports:
      - "${ANTFLY_PORT:-8080}:8080"
    volumes:
      - antfly_data:/antflydb
    command: ["swarm", "--termite=false", "--metadata-api=http://0.0.0.0:8080", "--data-dir=/antflydb"]
    restart: unless-stopped

volumes:
  antfly_data: {}
