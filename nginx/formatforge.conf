# Host-native FormatForge (no containers).
# PHP-FPM 502? From project root: ./scripts/align-php-fpm-socket.sh && sudo nginx -t && sudo systemctl reload nginx
# Local full stack: ./scripts/start.sh (PocketBase + PHP built-in server) — this file is only if you use nginx on the host.
# Copy to sites-enabled and set `root` to your clone (default: /var/www/formatforge).

server {
    listen 80;
    server_name localhost;
    root /var/www/formatforge;
    index index.php;

    location /pb/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /instagram/callback {
        rewrite ^ /index.php?instagram_callback=1&$args last;
    }

    location = /privacy {
        rewrite ^ /index.php?privacy=1 last;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include /var/www/formatforge/nginx/fastcgi-pass.conf;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_read_timeout 300;
    }

    location ~ /\. {
        deny all;
    }
    location ~ \.(env|git|htaccess) {
        deny all;
    }
}
