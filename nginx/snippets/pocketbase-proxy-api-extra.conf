# Include only inside `location /api/ { ... }` (after pocketbase-proxy-common.conf).
# Stops shared caches (CDN / reverse proxies) from serving one user's API response to another.

add_header Cache-Control "private, no-store, must-revalidate" always;
add_header Pragma "no-cache" always;
add_header Vary "Authorization, Cookie" always;
