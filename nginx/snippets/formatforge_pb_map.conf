# PocketBase behind nginx: Connection header must be empty for normal HTTP/1.1 to the upstream
# (see https://pocketbase.io/docs/going-to-production/ ). Unconditional Connection: upgrade
# breaks many requests and can show as 502 from nginx.
#
# Install once inside http { } — nginx loads conf.d before sites, so either:
#   sudo cp nginx/snippets/formatforge_pb_map.conf /etc/nginx/conf.d/formatforge_pb_map.conf
# OR add to /etc/nginx/nginx.conf inside http { }:
#   include /var/www/formatforge/nginx/snippets/formatforge_pb_map.conf;
#
# Then: sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $formatforge_pb_connection {
    default upgrade;
    ''      '';
}
