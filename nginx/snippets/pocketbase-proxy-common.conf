# Shared proxy directives for PocketBase (include inside: location /api/ or location /_/ { ... })
# Depends on: $formatforge_pb_connection from snippets/formatforge_pb_map.conf
# Pattern: /api/ = REST API + files, /_/ = Admin UI (stryder.tech style)

client_max_body_size 50M;
proxy_http_version 1.1;
proxy_read_timeout 360s;
proxy_send_timeout 360s;
proxy_connect_timeout 60s;
proxy_buffering off;

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
# Explicit: browsers send JWT here for PocketBase REST; some stacks omit it if not set.
proxy_set_header Authorization $http_authorization;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $formatforge_pb_connection;

# Upstream redirects to root become our site root (PocketBase at /api/ and /_/)
proxy_redirect http://127.0.0.1:8090/ $scheme://$host/;
proxy_redirect http://127.0.0.1/ $scheme://$host/;
