# FormatForge production — formatforgeplus.com
# PHP-FPM 502? Run: ./scripts/align-php-fpm-socket.sh && sudo nginx -t && sudo systemctl reload nginx
# PocketBase /api/ or /_/ 502? Install map + Connection handling (required):
#   sudo cp /var/www/formatforge/nginx/snippets/formatforge_pb_map.conf /etc/nginx/conf.d/
#   sudo nginx -t && sudo systemctl reload nginx
# Optional: nginx/formatforge-pb-subdomain.conf.example
# SSL certs: /etc/letsencrypt/live/formatforgeplus.com/
#
# If this file lives outside /var/www/formatforge, change the include path below.

server {
    listen 80;
    listen [::]:80;
    server_name formatforgeplus.com www.formatforgeplus.com;
    root /var/www/formatforge;
    index index.php;

    # Let's Encrypt ACME challenge (keep for renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/formatforge;
        allow all;
    }

    # After HTTPS is enabled, uncomment to redirect HTTP → HTTPS:
    # location / { return 301 https://$host$request_uri; }

    # Instagram OAuth callback (stripped URL)
    location = /instagram/callback {
        rewrite ^ /index.php?instagram_callback=1&$args last;
    }

    # Privacy policy
    location = /privacy {
        rewrite ^ /index.php?privacy=1 last;
    }

    # PocketBase: /api/ = REST API + files, /_/ = Admin UI (stryder.tech pattern)
    # Needs $formatforge_pb_connection (formatforge_pb_map.conf in conf.d)
    location /api/ {
        include /var/www/formatforge/nginx/snippets/pocketbase-proxy-common.conf;
        proxy_pass http://127.0.0.1:8090;
    }
    location /_/ {
        include /var/www/formatforge/nginx/snippets/pocketbase-proxy-common.conf;
        proxy_pass http://127.0.0.1:8090;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include /var/www/formatforge/nginx/fastcgi-pass.conf;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known) { deny all; }
    location ~ \.(env|git|htaccess) { deny all; }
}

