# FormatForge production — formatforgeplus.com
# SSL certs: /etc/letsencrypt/live/formatforgeplus.com/
# Run certbot: certbot certonly --webroot -w /path/to/formatforge -d formatforgeplus.com -d www.formatforgeplus.com

server {
    listen 80;
    listen [::]:80;
    server_name formatforgeplus.com www.formatforgeplus.com;
    root /var/www/html;
    index index.php;

    # Let's Encrypt ACME challenge (keep for renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    # After HTTPS is enabled, uncomment to redirect HTTP → HTTPS:
    # location / { return 301 https://$host$request_uri; }

    # Instagram OAuth callback (stripped URL)
    location = /instagram/callback {
        rewrite ^ /index.php?instagram_callback=1&$args last;
    }

    # Privacy policy
    location = /privacy {
        rewrite ^ /index.php?privacy=1 last;
    }

    # PocketBase API (for frontend JS — browser can't reach pocketbase:8090 directly)
    location /pb/ {
        proxy_pass http://pocketbase:8090/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_read_timeout 300;
    }

    # Deny hidden dirs except .well-known (for Let's Encrypt)
    location ~ /\.(?!well-known) { deny all; }
    location ~ \.(env|git|htaccess) { deny all; }
}

